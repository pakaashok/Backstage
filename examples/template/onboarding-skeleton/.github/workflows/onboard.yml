name: GitHub Org Onboarding
on: [push]

jobs:
  onboard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Onboard User
        env:
          GH_TOKEN: ${{ secrets.ORG_ADMIN_TOKEN }}
          USER: ${{ values.githubUser }}
        run: |
          # Invite user to Org
          gh api --method PUT /orgs/pakaashok/memberships/$USER -f role='member'
          
          # Initialize CODEOWNERS
          mkdir -p .github
          echo "* @$USER" > .github/CODEOWNERS
          
          git config --global user.name "Backstage-Bot"
          git config --global user.email "bot@backstage.io"
          git add .github/CODEOWNERS
          git commit -m "onboard: assigned ownership to $USER"
          git push
