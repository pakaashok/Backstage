apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: onboarding-workflow-tile
  title: Onboard User to Org
  description: Workflow to create repo, team, and CODEOWNERS
spec:
  owner: user:pakaashok
  type: service

  parameters:
    - title: Onboarding Details
      required: [githubUser, repoName, teamName]
      properties:
        githubUser:
          type: string
          title: GitHub Username
        repoName:
          type: string
          title: New Repository Name
        teamName:
          type: string
          title: GitHub Team Name

  steps:
    - id: fetch-onboarding
      name: Fetch Onboarding Files
      action: fetch:template
      input:
        url: ./onboarding-skeleton
        values:
          githubUser: ${{ parameters.githubUser }}

    - id: publish-onboarding
      name: Create Onboarding Repo
      action: publish:github
      input:
        repoUrl: 'github.com?owner=quantum-lab-x&repo=${{ parameters.repoName }}'
        defaultBranch: main
        description: 'Onboarding repo for ${{ parameters.githubUser }}'
        # FIXED: Must be 'public' for GitHub Free Tier to access Org Secrets
        repoVisibility: public 

    - id: trigger-team-creation
      name: Create GitHub Team and Add User
      action: github:actions:dispatch
      input:
        repoUrl: 'github.com?owner=quantum-lab-x&repo=platform-automation'
        workflowId: create-team.yml
        branchOrTagName: main
        workflowInputs:
          team_name: ${{ parameters.teamName }}
          github_user: ${{ parameters.githubUser }}

    - id: add-codeowners
      name: Add CODEOWNERS File
      action: github:repo:push
      input:
        repoUrl: 'github.com?owner=quantum-lab-x&repo=${{ parameters.repoName }}'
        branchName: main
        commitMessage: "Add CODEOWNERS"
        # Ensure the content indentation is correct
        files:
          - path: .github/CODEOWNERS
            content: |
              * @quantum-lab-x/${{ parameters.teamName }}